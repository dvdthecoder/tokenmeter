proxy:
  listen: "127.0.0.1:4191"
  mode: sidecar
  service_id: dev-local

sinks:
  sqlite:
    enabled: true
    options:
      path: "/tmp/tokenmeter-dev.db"
  otel:
    enabled: true
    options:
      endpoint: "localhost:4317"
      insecure: true
      interval_s: 10   # faster flush for dev

retention:
  days: 7

insights:
  enabled: true
  ollama_url: "http://localhost:11434"
  model: "llama3.2:3b"
  auto_generate: ""   # set to "daily" to enable background generation
  window_days: 7
