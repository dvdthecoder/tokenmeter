# tokenmeter OTel Collector — production config
# TLS on port 4317 + bearer-token authentication.
#
# Prerequisites:
#   1. Run ./generate-certs.sh to create certs/collector.crt + certs/collector.key
#   2. Set TOKENMETER_COLLECTOR_TOKEN env var (same value in edge tokenmeter config)
#   3. Use docker-compose.prod.yaml instead of docker-compose.yaml

extensions:
  bearertokenauth/server:
    token: "${env:TOKENMETER_COLLECTOR_TOKEN}"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        tls:
          cert_file: /etc/otel/certs/collector.crt
          key_file:  /etc/otel/certs/collector.key
        auth:
          authenticator: bearertokenauth/server
      http:
        endpoint: 0.0.0.0:4318
        tls:
          cert_file: /etc/otel/certs/collector.crt
          key_file:  /etc/otel/certs/collector.key
        auth:
          authenticator: bearertokenauth/server

processors:
  batch:
    timeout: 10s
    send_batch_size: 1000

  resource:
    attributes:
      - action: insert
        key: service.name
        value: tokenmeter

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: tokenmeter
    send_timestamps: true
    metric_expiration: 5m

  debug:
    verbosity: none   # silent in production

service:
  extensions: [bearertokenauth/server]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus, debug]
