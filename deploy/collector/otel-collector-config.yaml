receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1000

  # Add a tokenmeter label to all metrics so multi-tenant collectors
  # can filter by source.
  resource:
    attributes:
      - action: insert
        key: service.name
        value: tokenmeter

exporters:
  # Prometheus scrape endpoint — Prometheus polls this on port 8889
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: tokenmeter
    send_timestamps: true
    metric_expiration: 5m

  # Debug: print every metric to collector stdout (set to "none" in prod)
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus, debug]
