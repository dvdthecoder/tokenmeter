# Label definitions — synced automatically by .github/workflows/labels.yml
# Format: name, color (hex without #), description

# ── Type ──────────────────────────────────────────────────────────────────────
- name: bug
  color: d73a4a
  description: Something is broken

- name: enhancement
  color: 0075ca
  description: New feature or improvement

- name: documentation
  color: 0075ca
  description: Docs gap or correction

- name: question
  color: d876e3
  description: Further information requested

- name: "good first issue"
  color: 7057ff
  description: Good for newcomers

- name: "help wanted"
  color: 008672
  description: Extra attention needed

- name: "breaking change"
  color: e4e669
  description: Breaks existing behaviour or config

- name: gdpr
  color: f9d0c4
  description: Privacy or compliance concern

- name: duplicate
  color: cfd3d7
  description: Already reported

- name: wontfix
  color: ffffff
  description: Out of scope or by design

