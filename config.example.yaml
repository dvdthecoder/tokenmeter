proxy:
  listen: "127.0.0.1:4191"
  mode: sidecar          # sidecar | shared
  service_id: my-agent   # identifies this instance in metrics

sinks:
  sqlite:
    enabled: true
    options:
      path: "~/.local/share/tokenmeter/events.db"
  otel:
    enabled: false
    options:
      endpoint: "localhost:4317"
  prometheus:
    enabled: false
    options:
      listen: "127.0.0.1:9090"

middleware:
  - name: redaction      # opt-in PII stripping — disabled by default
    options:
      enabled: false

privacy:
  data_minimisation: false   # true = drop service_id, keep counts only
  hash_service_id: true      # SHA-256 prefix the service_id before storage (default: true)
  hash_user: false           # SHA-256(username + org_salt) before storage; set TOKENMETER_ORG_SALT
  org_salt: ""               # shared team salt for user hashing; prefer TOKENMETER_ORG_SALT env var
  encrypt_at_rest: false
  encryption_key: ""         # set via TOKENMETER_ENCRYPTION_KEY env var

retention:
  days: 90                   # auto-purge records older than this

insights:
  enabled: false
  ollama_url: "http://localhost:11434"  # Ollama endpoint (https://ollama.com)
  model: "llama3.2:3b"                  # any model pulled in Ollama; llama3.2:3b is fast and small
  auto_generate: ""                     # "daily" to generate once per day in background; "" to disable
  window_days: 7                        # how many days of events to analyse
